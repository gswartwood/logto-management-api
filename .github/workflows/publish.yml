name: Publish to NuGet

on:
  push:
    tags:
      - "v*"

permissions:
  id-token: write # enable GitHub OIDC token issuance for this job
  contents: read
  packages: write

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # REQUIRED for MinVer

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Pack (MinVer auto-versioning)
        run: dotnet pack Logto.ManagementApi/Logto.ManagementApi.csproj --configuration Release --no-build --output ./nupkg

        # Get a short-lived NuGet API key
      - name: NuGet login (OIDC → temp API key)
        uses: NuGet/login@v1
        id: login
        with:
          user: ${{ secrets.NUGET_USER }}
  
      - name: Publish to NuGet
        run: dotnet nuget push "./nupkg/*.nupkg" --source "https://api.nuget.org/v3/index.json" --api-key ${{steps.login.outputs.NUGET_API_KEY}} --skip-duplicate
